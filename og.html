<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f4f4f4;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    display: flex;
    align-items: center;
    gap: 44px;
    padding: 0 56px;
  }
  .left { width: 430px; }
  .left .badge { font-size: 64px; }
  .left h1 {
    font-size: 60px;
    line-height: 1.05;
    margin: 14px 0 18px;
    letter-spacing: -1px;
  }
  .left p { font-size: 25px; color: #555; line-height: 1.4; }
  .left .chan { margin-top: 26px; font-size: 26px; font-weight: 700; color: #2d6cdf; }

  .card {
    background: #fff;
    border: 5px solid #222;
    border-radius: 18px;
    padding: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 92px);
    grid-auto-rows: 92px;
    gap: 7px;
  }
  .cell {
    border: 2.5px solid #444;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
  }
  .cell.free {
    background: #e0e0e0;
    border-color: #888;
    flex-direction: column;
    font-size: 30px;
  }
  .cell.free .lbl {
    font-size: 15px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="badge">🚗🛣️🎲</div>
      <h1>Дорожное бинго</h1>
      <p>Карточки для игры в дорогу. Свой список, эмодзи-картинки, печать и&nbsp;PDF.</p>
      <div class="chan">@carpemachinatio</div>
    </div>
    <div class="card">
      <div class="grid">
        <div class="cell">🚌</div><div class="cell">🐦</div><div class="cell">🌳</div><div class="cell">🚲</div><div class="cell">🌉</div>
        <div class="cell">🐄</div><div class="cell">🐎</div><div class="cell">🏪</div><div class="cell">🚓</div><div class="cell">🐈</div>
        <div class="cell">🌲</div><div class="cell">🦆</div><div class="cell free"><div>🚗</div><div class="lbl">Бинго</div></div><div class="cell">⛪</div><div class="cell">🚜</div>
        <div class="cell">🛑</div><div class="cell">⛽</div><div class="cell">🐑</div><div class="cell">🌾</div><div class="cell">🏍️</div>
        <div class="cell">🚂</div><div class="cell">🐕</div><div class="cell">🌽</div><div class="cell">⛰️</div><div class="cell">🦌</div>
      </div>
    </div>
  </div>
</body>
</html>
